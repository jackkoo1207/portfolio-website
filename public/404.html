<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname.replace('/portfolio-website', '') || '/';
    window.location.replace('/portfolio-website/?redirect=' + encodeURIComponent(path));
  </script>
</head>

</html>
